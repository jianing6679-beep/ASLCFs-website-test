<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找回密码 - 农业SLCFs排放数据集</title>
  <link rel="stylesheet" href="styles-modern.css?v=20260604brand-footer" />
  <script src="script.js?v=20260604login-token" defer></script>
</head>
<body data-page="forgot-password">
  <div class="page-shell">
    <div id="site-header-slot" class="site-shell-slot"></div>
    <div id="site-announcement-slot" class="site-shell-slot"></div>

    <main class="page-main">
      <section class="content-section">
        <div class="content-grid">
          <div class="content-card">
            <h1 id="forgotPasswordTitle">找回密码</h1>
            <p class="auth-intro" id="forgotPasswordText">密码重置功能暂未开放，请联系管理员协助重置密码。</p>
            <div id="authMessage" class="form-message" role="status" aria-live="polite"></div>

            <form id="forgotPasswordForm" class="auth-form">
              <div class="form-group">
                <label for="resetEmail" id="resetEmailLabel">教育邮箱</label>
                <input type="email" id="resetEmail" name="email" placeholder="请输入教育邮箱" required autocomplete="email" />
              </div>
              <button type="submit" id="sendResetLinkButton">查看重置说明</button>
            </form>

            <p id="backToLoginLink">想起密码了？ <a href="login.html">返回登录</a></p>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer-slot" class="site-shell-slot"></div>
  </div>
</body>
</html>
