<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 农业SLCFs排放数据集</title>
  <link rel="stylesheet" href="styles-modern.css?v=20260604brand-footer" />
  <script src="script.js?v=20260604brand-footer" defer></script>
</head>
<body data-page="login">
  <div class="page-shell">
    <div id="site-header-slot" class="site-shell-slot"></div>
    <div id="site-announcement-slot" class="site-shell-slot"></div>

    <main class="page-main">
      <section class="content-section">
        <div class="content-grid">
          <div class="content-card">
            <h1 id="loginTitle">用户登录</h1>
            <div id="authMessage" class="form-message" role="status" aria-live="polite"></div>
            <form id="loginForm" class="auth-form">
              <div class="form-group">
                <label for="username" id="usernameLabel">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required autocomplete="username" />
              </div>
              <div class="form-group">
                <label for="password" id="passwordLabel">密码</label>
                <div class="password-wrapper">
                  <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password" />
                  <button type="button" class="password-toggle" aria-label="显示密码">
                    <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="remember-me">
                <input type="checkbox" id="rememberMe" name="rememberMe" />
                <label for="rememberMe">记住我</label>
              </div>
              <button type="submit" id="loginButton">登录</button>
            </form>
            <div class="forgot-password">
              <a href="forgot-password.html" id="forgotPasswordLink">忘记密码？</a>
            </div>
            <p id="registerLink">还没有账户？ <a href="register.html">立即注册</a></p>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer-slot" class="site-shell-slot"></div>
  </div>
</body>
</html>
