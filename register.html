<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 - 农业SLCFs排放数据集</title>
  <link rel="stylesheet" href="styles-modern.css?v=20260603a" />
  <script src="script.js?v=20260603a" defer></script>
</head>
<body data-page="register">
  <div class="page-shell">
    <div id="site-header-slot" class="site-shell-slot"></div>
    <div id="site-announcement-slot" class="site-shell-slot"></div>

    <main class="page-main">
      <section class="content-section">
        <div class="content-grid">
          <div class="content-card">
            <h1 id="registerTitle">用户注册</h1>
            <div id="authMessage" class="form-message" role="status" aria-live="polite"></div>
            <form id="registerForm" class="auth-form">
              <div class="form-group">
                <label for="regUsername" id="regUsernameLabel">用户名</label>
                <input type="text" id="regUsername" name="username" placeholder="请输入真实姓名" required autocomplete="name" />
              </div>
              <div class="form-group">
                <label for="regInstitution" id="regInstitutionLabel">机构</label>
                <input type="text" id="regInstitution" name="institution" placeholder="请输入所在机构" autocomplete="organization" required />
              </div>
              <div class="form-group">
                <label for="regTitle" id="regTitleLabel">职称</label>
                <select id="regTitle" name="title" required>
                  <option value="">请选择职称</option>
                  <option value="undergraduate">本科生</option>
                  <option value="master">硕士研究生</option>
                  <option value="doctoral">博士研究生</option>
                  <option value="postdoc">博士后</option>
                  <option value="lecturer">讲师</option>
                  <option value="associate_professor">副教授</option>
                  <option value="professor">教授</option>
                  <option value="researcher">研究员</option>
                  <option value="engineer">工程师</option>
                  <option value="other">其他</option>
                </select>
              </div>
              <div class="form-group" id="regAdvisorGroup" hidden>
                <label for="regAdvisor" id="regAdvisorLabel">导师姓名</label>
                <input type="text" id="regAdvisor" name="advisor" placeholder="请输入导师真实姓名" autocomplete="off" />
                <p class="field-hint" id="regAdvisorHint">本科生、硕士研究生、博士研究生和博士后需填写导师姓名。</p>
              </div>
              <div class="form-group">
                <label for="regEmail" id="regEmailLabel">教育邮箱</label>
                <input type="email" id="regEmail" name="email" placeholder="example@university.edu.cn" autocomplete="email" required />
                <p class="field-hint" id="regEmailHint">请填写学校或科研机构教育邮箱，用于身份核验与审核。</p>
              </div>
              <div class="form-group">
                <label for="regPassword" id="regPasswordLabel">密码</label>
                <div class="password-wrapper">
                  <input type="password" id="regPassword" name="password" placeholder="请输入密码" required autocomplete="new-password" />
                  <button type="button" class="password-toggle" aria-label="显示密码">
                    <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                    </svg>
                  </button>
                </div>
                <div class="password-rules" id="passwordRules" aria-live="polite">
                  <p>密码需满足：</p>
                  <ul>
                    <li data-rule="length">至少 6 个字符</li>
                    <li data-rule="lowercase">包含小写字母</li>
                    <li data-rule="uppercase">包含大写字母</li>
                    <li data-rule="number">包含数字</li>
                  </ul>
                </div>
              </div>
              <div class="form-group">
                <label for="confirmPassword" id="confirmPasswordLabel">确认密码</label>
                <div class="password-wrapper">
                  <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码" required autocomplete="new-password" />
                  <button type="button" class="password-toggle" aria-label="显示密码">
                    <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                      <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                    </svg>
                  </button>
                </div>
                <p class="field-hint" id="confirmPasswordHint">请再次输入相同密码。</p>
              </div>
              <button type="submit" id="registerButton">注册</button>
            </form>
            <p id="loginLink">已有账户？ <a href="login.html">立即登录</a></p>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer-slot" class="site-shell-slot"></div>
  </div>
</body>
</html>
